name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Lint
        run: uv run ruff check src tests

      - name: Test
        # The full suite is hermetic: ingest is mocked, the warehouse is built
        # from synthetic parquet, and the agent runs against a deterministic
        # FakePlanModel. No network and no API key required.
        run: uv run pytest -q

      - name: Eval metrics from cached records (if present)
        # The risk-coverage math is verified against committed records so CI
        # reports the same numbers as the README without calling any model.
        run: |
          if [ -f docs/eval/records.json ]; then
            uv run peerlens eval --from-cache
          else
            echo "no cached eval records; skipping"
          fi
